<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Partecipanti</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e293b;
            color: #e2e8f0;
        }
        .section {
            background: #334155;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        h2 {
            color: #60a5fa;
        }
        pre {
            background: #1e293b;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .name {
            color: #34d399;
            font-weight: bold;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>🔍 Debug Partecipanti</h1>
    
    <div class="section">
        <h2>Anagrafica Partecipanti</h2>
        <div id="registry"></div>
    </div>
    
    <div class="section">
        <h2>Partecipanti negli Scenari</h2>
        <div id="scenarios"></div>
    </div>
    
    <div class="section">
        <h2>Partecipanti nei Consuntivi</h2>
        <div id="actuals"></div>
    </div>

    <button onclick="window.location.href='index.html'">← Torna all'App</button>
    <button onclick="forceSync()">🔄 Forza Sincronizzazione</button>

    <script>
        function load() {
            const participants = JSON.parse(localStorage.getItem('participants_registry') || '[]');
            const scenarios = JSON.parse(localStorage.getItem('scenarios') || '[]');
            const actuals = JSON.parse(localStorage.getItem('actuals') || '[]');

            // Anagrafica
            let registryHtml = '<h3>Nomi in anagrafica:</h3>';
            participants.forEach(p => {
                registryHtml += `<div class="name">"${p.name}" (ID: ${p.id})</div>`;
            });
            document.getElementById('registry').innerHTML = registryHtml;

            // Scenari
            let scenariosHtml = '<h3>Nomi negli scenari:</h3>';
            scenarios.forEach(s => {
                if (s.participants && s.participants.length > 0) {
                    scenariosHtml += `<div><strong>${s.name}:</strong><br>`;
                    s.participants.forEach(name => {
                        scenariosHtml += `<span class="name">"${name}"</span> `;
                    });
                    scenariosHtml += '</div><br>';
                }
            });
            document.getElementById('scenarios').innerHTML = scenariosHtml;

            // Consuntivi
            let actualsHtml = '<h3>Nomi nei consuntivi:</h3>';
            actuals.forEach(a => {
                if (a.participants && a.participants.length > 0) {
                    actualsHtml += `<div><strong>${a.name}:</strong><br>`;
                    a.participants.forEach(name => {
                        actualsHtml += `<span class="name">"${name}"</span> `;
                    });
                    actualsHtml += '</div><br>';
                }
            });
            document.getElementById('actuals').innerHTML = actualsHtml;
        }

        function forceSync() {
            const participants = JSON.parse(localStorage.getItem('participants_registry') || '[]');
            const scenarios = JSON.parse(localStorage.getItem('scenarios') || '[]');
            const actuals = JSON.parse(localStorage.getItem('actuals') || '[]');

            // Crea mappa case-insensitive
            const nameMap = new Map();
            participants.forEach(p => {
                nameMap.set(p.name.toLowerCase(), p.name);
            });

            console.log('Mappa nomi:', nameMap);

            let changes = 0;

            // Aggiorna scenari
            scenarios.forEach(s => {
                if (s.participants) {
                    s.participants = s.participants.map(name => {
                        const correctName = nameMap.get(name.toLowerCase());
                        if (correctName && correctName !== name) {
                            console.log(`Scenario "${s.name}": "${name}" → "${correctName}"`);
                            changes++;
                            return correctName;
                        }
                        return name;
                    });
                }
            });

            // Aggiorna consuntivi
            actuals.forEach(a => {
                if (a.participants) {
                    a.participants = a.participants.map(name => {
                        const correctName = nameMap.get(name.toLowerCase());
                        if (correctName && correctName !== name) {
                            console.log(`Consuntivo "${a.name}": "${name}" → "${correctName}"`);
                            changes++;
                            return correctName;
                        }
                        return name;
                    });
                }
            });

            if (changes > 0) {
                localStorage.setItem('scenarios', JSON.stringify(scenarios));
                localStorage.setItem('actuals', JSON.stringify(actuals));
                alert(`✅ Sincronizzate ${changes} occorrenze!`);
                load(); // Ricarica
            } else {
                alert('ℹ️ Nessuna modifica necessaria - tutto già sincronizzato!');
            }
        }

        load();
    </script>
</body>
</html>
