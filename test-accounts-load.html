<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Caricamento accounts.js</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            font-size: 18px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #bee5eb;
        }
        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 Test Caricamento accounts.js</h1>
    
    <div id="status" class="status info">
        ⏳ Caricamento in corso...
    </div>

    <div id="details"></div>

    <script>
        console.log('=== INIZIO TEST ===');
        
        // Test 1: Verifica se AccountsManager esiste
        setTimeout(() => {
            const statusDiv = document.getElementById('status');
            const detailsDiv = document.getElementById('details');
            
            if (typeof AccountsManager !== 'undefined') {
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '✅ SUCCESS: AccountsManager è caricato correttamente!';
                
                detailsDiv.innerHTML = `
                    <h2>✅ Dettagli AccountsManager</h2>
                    <pre>${JSON.stringify({
                        'Tipo': typeof AccountsManager,
                        'Metodi disponibili': Object.keys(AccountsManager).filter(k => typeof AccountsManager[k] === 'function'),
                        'Proprietà': Object.keys(AccountsManager).filter(k => typeof AccountsManager[k] !== 'function')
                    }, null, 2)}</pre>
                `;
                
                console.log('✅ AccountsManager caricato:', AccountsManager);
            } else {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ ERROR: AccountsManager NON è definito!';
                
                detailsDiv.innerHTML = `
                    <h2>❌ Problema Rilevato</h2>
                    <p>Il file accounts.js non si è caricato correttamente.</p>
                    <p><strong>Possibili cause:</strong></p>
                    <ul>
                        <li>Errore di sintassi JavaScript nel file</li>
                        <li>File non trovato o percorso errato</li>
                        <li>Browser cache non aggiornata</li>
                    </ul>
                    <p><strong>Soluzione:</strong></p>
                    <ol>
                        <li>Apri la Console del browser (F12)</li>
                        <li>Cerca errori in rosso</li>
                        <li>Fai un hard refresh (Ctrl+Shift+R o Cmd+Shift+R)</li>
                    </ol>
                `;
                
                console.error('❌ AccountsManager NON definito');
            }
            
            console.log('=== FINE TEST ===');
        }, 500);
    </script>

    <!-- Carica il file accounts.js -->
    <script src="js/accounts.js"></script>
</body>
</html>
