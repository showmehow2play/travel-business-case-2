<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Pulsante Dare/Avere</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .btn {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }
        .log {
            background: #f5f5f5;
            padding: 10px;
            margin-top: 20px;
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Test Pulsante Dare/Avere</h1>
    
    <h2>Scenario 1: Pulsante con event listener</h2>
    <button id="viewSettlementsFromActualBtn" class="btn btn-secondary">🔄 Dare/Avere (con listener)</button>
    
    <h2>Scenario 2: Pulsante con onclick inline</h2>
    <button class="btn btn-secondary" onclick="testInlineClick()">🔄 Dare/Avere (inline)</button>
    
    <div class="log" id="log">Log eventi:</div>

    <script>
        const log = document.getElementById('log');
        
        function addLog(message) {
            const timestamp = new Date().toLocaleTimeString();
            log.textContent += `\n[${timestamp}] ${message}`;
        }

        // Simula l'oggetto ActualsUI
        const ActualsUI = {
            currentActual: { id: 'test-123', name: 'Test Consuntivo' },
            
            viewSettlements(actualId) {
                addLog(`✅ viewSettlements chiamato con ID: ${actualId}`);
                alert(`Funziona! ID: ${actualId}`);
            }
        };

        // Registra event listener (come nel codice reale)
        document.addEventListener('DOMContentLoaded', () => {
            addLog('DOM caricato, registro event listener...');
            
            const viewSettlementsFromActualBtn = document.getElementById('viewSettlementsFromActualBtn');
            if (viewSettlementsFromActualBtn) {
                addLog('✅ Pulsante trovato nel DOM');
                
                viewSettlementsFromActualBtn.addEventListener('click', () => {
                    addLog('🖱️ Click rilevato!');
                    if (ActualsUI.currentActual) {
                        addLog(`currentActual esiste: ${ActualsUI.currentActual.name}`);
                        ActualsUI.viewSettlements(ActualsUI.currentActual.id);
                    } else {
                        addLog('❌ currentActual è null/undefined');
                    }
                });
                
                addLog('✅ Event listener registrato');
            } else {
                addLog('❌ Pulsante NON trovato nel DOM');
            }
        });

        // Test onclick inline
        function testInlineClick() {
            addLog('🖱️ Click inline rilevato!');
            ActualsUI.viewSettlements('inline-test');
        }

        addLog('Script caricato');
    </script>
</body>
</html>
